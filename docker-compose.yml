services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist the DB as a named volume so the host doesn't have to
      # pre-create `safer.db`; the container writes directly to it.
      - safer_db:/app/data
    environment:
      - SAFER_DB_PATH=/app/data/safer.db
      - SAFER_BACKEND_HOST=0.0.0.0
      - SAFER_BACKEND_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  safer_db:

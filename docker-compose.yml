services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./safer.db:/app/safer.db
      - ./packages/backend/src:/app/src
    environment:
      - SAFER_DB_PATH=/app/safer.db
      - SAFER_BACKEND_HOST=0.0.0.0
      - SAFER_BACKEND_PORT=8000
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

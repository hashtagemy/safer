[project]
name = "safer-backend"
version = "0.1.0"
description = "SAFER backend — FastAPI + SQLite WAL + Judge + Gateway + Inspector"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.5",
    "anthropic>=0.40",
    "websockets>=12.0",
    "httpx>=0.27",
    "jinja2>=3.1",
    "weasyprint>=62",
    "aiosqlite>=0.20",
    "python-multipart>=0.0.9",
    "safer-sdk",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.5", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/safer_backend"]

[tool.uv.sources]
safer-sdk = { workspace = true }

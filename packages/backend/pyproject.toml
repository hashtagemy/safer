[project]
name = "safer-backend"
version = "0.1.2"
description = "SAFER backend — Agent Control Plane: FastAPI + SQLite WAL + Multi-Persona Judge + Gateway + Inspector + Red-Team + Compliance Pack."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    { name = "Mert Ozbas", email = "mertozbas@gmail.com" },
    { name = "SAFER Contributors" },
]
maintainers = [
    { name = "Mert Ozbas", email = "mertozbas@gmail.com" },
]
keywords = [
    "ai",
    "agents",
    "control-plane",
    "observability",
    "security",
    "llm",
    "claude",
    "judge",
    "inspector",
    "red-team",
    "gateway",
    "policy",
    "compliance",
    "owasp-llm",
    "self-hosted",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
    "Topic :: Security",
]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.5",
    "anthropic>=0.40",
    "websockets>=12.0",
    "httpx>=0.27",
    "jinja2>=3.1",
    "weasyprint>=62",
    "aiosqlite>=0.20",
    "python-multipart>=0.0.9",
    "safer-sdk>=0.1.2,<0.2",
    "opentelemetry-proto>=1.28",
    "opentelemetry-sdk>=1.28",
    "opentelemetry-semantic-conventions>=0.49b0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.5", "httpx>=0.27"]

[project.urls]
Homepage = "https://github.com/hashtagemy/safer"
Documentation = "https://github.com/hashtagemy/safer#readme"
Repository = "https://github.com/hashtagemy/safer"
Issues = "https://github.com/hashtagemy/safer/issues"
Changelog = "https://github.com/hashtagemy/safer/releases"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/safer_backend"]

[tool.uv.sources]
safer-sdk = { workspace = true }
